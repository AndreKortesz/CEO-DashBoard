[build]
builder = "nixpacks"
buildCommand = "cd backend && python -m venv /app/venv && /app/venv/bin/pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && export LD_LIBRARY_PATH=$(find /nix/store -name 'libstdc++.so.6' -printf '%h\n' 2>/dev/null | head -1):$LD_LIBRARY_PATH && /app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
