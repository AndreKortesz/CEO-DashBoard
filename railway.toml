[build]
builder = "nixpacks"
buildCommand = """
cd frontend && npm install && npm run build && \
cd ../backend && python -m venv /app/venv && /app/venv/bin/pip install -r requirements.txt
"""

[deploy]
startCommand = "cd backend && /app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
